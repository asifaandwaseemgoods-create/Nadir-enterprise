<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Ledger / Khata Book</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        input, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #218838;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .total-row {
            font-weight: bold;
            background-color: #ddd !important;
        }
        .delete-btn {
            background-color: #dc3545;
            padding: 5px 10px;
            font-size: 12px;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Office Ledger / Khata Book</h2>
    
    <div class="form-group">
        <input type="date" id="date">
        <input type="text" id="description" placeholder="Description">
        <input type="number" id="credit" placeholder="Credit (Inflow)">
        <input type="number" id="debit" placeholder="Debit (Outflow)">
        <button id="addBtn">Add Entry</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>S.No</th>
                <th>Date</th>
                <th>Description</th>
                <th>Credit</th>
                <th>Debit</th>
                <th>Balance</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="ledgerBody">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Aapki Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAJSo4ldJ7kWXhR--83iw1CjpcYu7KrFyI",
        authDomain: "nadir-c9a51.firebaseapp.com",
        projectId: "nadir-c9a51",
        storageBucket: "nadir-c9a51.appspot.com",
        messagingSenderId: "61998925156",
        appId: "1:61998925156:web:3183df8fa6e9a34009a671"
    };

    // Firebase Initialize
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Aaj ki date auto-set karne ke liye
    document.getElementById('date').value = new Date().toISOString().split('T')[0];

    // --- 1. DATA SAVE KARNA ---
    document.getElementById('addBtn').addEventListener('click', async () => {
        const date = document.getElementById('date').value;
        const description = document.getElementById('description').value;
        const credit = parseFloat(document.getElementById('credit').value) || 0;
        const debit = parseFloat(document.getElementById('debit').value) || 0;

        if (!date || !description) {
            alert("Please fill Date and Description");
            return;
        }

        try {
            // Firebase mein data save ho raha hai
            await addDoc(collection(db, "ledger"), {
                date: date,
                description: description,
                credit: credit,
                debit: debit,
                timestamp: new Date() // Sahi tarteeb ke liye timestamp
            });

            // Form clear karna
            document.getElementById('description').value = '';
            document.getElementById('credit').value = '';
            document.getElementById('debit').value = '';
        } catch (error) {
            console.error("Error adding entry: ", error);
        }
    });

    // --- 2. LIVE DATA SHOW KARNA (REAL-TIME UPDATE) ---
    // Ye code hamesha database ko dekhta rahega, koi bhi device entry karega ye fauran screen update karega
    const q = query(collection(db, "ledger"), orderBy("date", "asc"), orderBy("timestamp", "asc"));
    
    onSnapshot(q, (snapshot) => {
        const ledgerBody = document.getElementById('ledgerBody');
        ledgerBody.innerHTML = ''; // Purana view clear karein

        let runningBalance = 0;
        let totalCredit = 0;
        let totalDebit = 0;
        let sNo = 1;

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id; // Har entry ki unique ID delete karne ke liye

            runningBalance += (data.credit - data.debit);
            totalCredit += data.credit;
            totalDebit += data.debit;

            const row = `<tr>
                <td>${sNo++}</td>
                <td>${data.date}</td>
                <td>${data.description}</td>
                <td style="color: green;">${data.credit > 0 ? data.credit : '-'}</td>
                <td style="color: red;">${data.debit > 0 ? data.debit : '-'}</td>
                <td style="font-weight: bold;">${runningBalance}</td>
                <td><button class="delete-btn" data-id="${id}">Delete</button></td>
            </tr>`;
            
            ledgerBody.innerHTML += row;
        });

        // Aakhir mein Total wali row add karna
        if(snapshot.size > 0) {
            const totalRow = `<tr class="total-row">
                <td colspan="3" style="text-align: right;">Total / Net Balance:</td>
                <td style="color: green;">${totalCredit}</td>
                <td style="color: red;">${totalDebit}</td>
                <td colspan="2" style="background-color: #28a745; color: white;">${runningBalance}</td>
            </tr>`;
            ledgerBody.innerHTML += totalRow;
        }

        // Delete buttons par click event lagana
        const deleteButtons = document.querySelectorAll('.delete-btn');
        deleteButtons.forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const docId = e.target.getAttribute('data-id');
                if(confirm("Kya aap ye entry delete karna chahte hain?")) {
                    await deleteDoc(doc(db, "ledger", docId));
                }
            });
        });
    });
</script>

</body>
</html>
